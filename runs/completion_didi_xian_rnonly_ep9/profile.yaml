  # Thresholds  (TODO: 训完后用 PR 曲线 sweep 出更优阈值, 当前先沿用 spacenet 默认)

  ITSC_THRESHOLD: 0.059

  ROAD_THRESHOLD: 0.179

  TOPO_THRESHOLD: 0.596


  # NMS / Neighbor

  ITSC_NMS_RADIUS: 8

  ROAD_NMS_RADIUS: 16

  NEIGHBOR_RADIUS: 64

