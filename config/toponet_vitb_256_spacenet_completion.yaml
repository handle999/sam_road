DATASET: 'spacenet'

# IN1k + MAE only
NO_SAM: False

SAM_VERSION: 'vit_b'
SAM_CKPT_PATH: 'sam_ckpts/sam_vit_b_01ec64.pth'
PATCH_SIZE: 256
BATCH_SIZE: 16           # 12GB 显存安全值 (原版64需要4x A100)
DATA_WORKER_NUM: 2        # 本地多 worker 加速数据加载
TRAIN_EPOCHS: 10
BASE_LR: 0.001
FREEZE_ENCODER: False
ENCODER_LR_FACTOR: 0.1
ENCODER_LORA: False
FOCAL_LOSS: False
USE_SAM_DECODER: False

# TOPONET
# sample per patch
TOPO_SAMPLE_NUM: 128
TOPONET_VERSION: 'normal'

# Completion-specific
GRAPH_DIM: 32                # GNN 图拓扑嵌入维度
KEEP_RATIO_MIN: 0.2          # 动态 keep_ratio 下限
KEEP_RATIO_MAX: 0.8          # 动态 keep_ratio 上限
MODALITY_DROPOUT_PROB: 0.2   # 全部先验清空概率 (模型退化为 Extraction)
TRAJ_DROPOUT_PROB: 0.2       # traj 热力图增强中的 dropout/腐蚀概率

# Inference
INFER_BATCH_SIZE: 32
SAMPLE_MARGIN: 0
INFER_PATCHES_PER_EDGE: 16

# ======= Finding best thresholds ======
# ======= keypoint ======
# Best threshold 0.18122777342796326, P=0.3351731598377228 R=0.3238157331943512 F1=0.3293965756893158
# ======= road ======
# Best threshold 0.3559521734714508, P=0.6531581878662109 R=0.7095447182655334 F1=0.6801849007606506
# ======= topo ======
# Best threshold 0.7053705453872681, P=0.966937780380249 R=0.9677366614341736 F1=0.9673370122909546
# Thresholds
ITSC_THRESHOLD: 0.181
ROAD_THRESHOLD: 0.355
TOPO_THRESHOLD: 0.705

# NMS / Neighbor
ITSC_NMS_RADIUS: 8
ROAD_NMS_RADIUS: 16
NEIGHBOR_RADIUS: 64
MAX_NEIGHBOR_QUERIES: 16
